<div class="home-container">

  <fieldset class="retro-panel title-panel">
    <legend>DUNGEON COMPANION</legend>
    <p class="subtitle">O QUE DESEJA FAZER, AVENTUREIRO?</p>
  </fieldset>

  <div class="menu-options">

    <button class="retro-card" (click)="createCharacter()">
      <span class="card-icon">⚔</span>
      <span class="card-title">CRIAR PERSONAGEM</span>
      <span class="card-desc">Forje um novo herói com o auxílio da IA</span>
    </button>

    <button class="retro-card" (click)="listCharacters()">
      <span class="card-icon">📜</span>
      <span class="card-title">MEUS PERSONAGENS</span>
      <span class="card-desc">Acesse as fichas dos seus aventureiros</span>
    </button>

  </div>

</div>
